<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffef74" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#ff5a00" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#5a0000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gold" cx="35%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#fff8b8"/>
      <stop offset="35%" stop-color="#ffd43b"/>
      <stop offset="70%" stop-color="#c06d00"/>
      <stop offset="100%" stop-color="#6a3400"/>
    </radialGradient>
    <linearGradient id="rimDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffef8a"/>
      <stop offset="45%" stop-color="#c86e00"/>
      <stop offset="100%" stop-color="#4a1d00"/>
    </linearGradient>
    <linearGradient id="redSector" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff2a00"/>
      <stop offset="50%" stop-color="#b40000"/>
      <stop offset="100%" stop-color="#640000"/>
    </linearGradient>
    <linearGradient id="yellowSector" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff875"/>
      <stop offset="48%" stop-color="#ffc400"/>
      <stop offset="100%" stop-color="#f07800"/>
    </linearGradient>
    <radialGradient id="bulb" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="35%" stop-color="#fff6bf"/>
      <stop offset="75%" stop-color="#ff9c00"/>
      <stop offset="100%" stop-color="#b43b00"/>
    </radialGradient>
    <filter id="drop" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="9" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textStroke" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1" flood-color="#000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <circle cx="250" cy="250" r="240" fill="url(#bgGlow)"/>
  <circle cx="250" cy="250" r="226" fill="url(#rimDark)" filter="url(#drop)"/>
  <circle cx="250" cy="250" r="205" fill="#5a1000"/>

  <!-- sectors: 1 right-bottom, then clockwise -->
  <path d="M250 250 L455 250 A205 205 0 0 1 352.5 427.54 Z" fill="url(#redSector)"/>
  <path d="M250 250 L352.5 427.54 A205 205 0 0 1 147.5 427.54 Z" fill="url(#yellowSector)"/>
  <path d="M250 250 L147.5 427.54 A205 205 0 0 1 45 250 Z" fill="url(#redSector)"/>
  <path d="M250 250 L45 250 A205 205 0 0 1 147.5 72.46 Z" fill="url(#yellowSector)"/>
  <path d="M250 250 L147.5 72.46 A205 205 0 0 1 352.5 72.46 Z" fill="url(#redSector)"/>
  <path d="M250 250 L352.5 72.46 A205 205 0 0 1 455 250 Z" fill="url(#yellowSector)"/>

  <!-- glossy overlay -->
  <path d="M80 190 C120 80 285 36 400 112 C305 92 165 118 80 190 Z" fill="#fff" opacity="0.14"/>

  <!-- metal dividers -->
  <g stroke="url(#gold)" stroke-width="10" stroke-linecap="round">
    <line x1="250" y1="250" x2="455" y2="250"/>
    <line x1="250" y1="250" x2="352.5" y2="427.54"/>
    <line x1="250" y1="250" x2="147.5" y2="427.54"/>
    <line x1="250" y1="250" x2="45" y2="250"/>
    <line x1="250" y1="250" x2="147.5" y2="72.46"/>
    <line x1="250" y1="250" x2="352.5" y2="72.46"/>
  </g>

  <!-- rings -->
  <circle cx="250" cy="250" r="226" fill="none" stroke="#fff4a8" stroke-width="5"/>
  <circle cx="250" cy="250" r="213" fill="none" stroke="#ff8a00" stroke-width="5" opacity="0.8"/>
  <circle cx="250" cy="250" r="204" fill="none" stroke="#6e2400" stroke-width="8"/>
  <circle cx="250" cy="250" r="80" fill="none" stroke="url(#gold)" stroke-width="10"/>

  <!-- bulbs generated manually -->
  <g filter="url(#glow)">
    <circle cx="250.00" cy="30.00" r="6.2" fill="url(#bulb)" stroke="#fff6b8" stroke-width="1.4"/>
    <circle cx="288.20" cy="33.34" r="6.2" fill="url(#bulb)" stroke="#fff6b8" stroke-width="1.4"/>
