    <circle cx="33.34" cy="288.20" r="6.2" fill="url(#bulb)" stroke="#fff6b8" stroke-width="1.4"/>
    <circle cx="30.00" cy="250.00" r="6.2" fill="url(#bulb)" stroke="#fff6b8" stroke-width="1.4"/>
    <circle cx="33.34" cy="211.80" r="6.2" fill="url(#bulb)" stroke="#fff6b8" stroke-width="1.4"/>
