  <!-- 3d center -->
  <circle cx="250" cy="250" r="62" fill="#5b2200" opacity="0.8"/>
  <circle cx="250" cy="250" r="55" fill="url(#gold)" stroke="#fff4a8" stroke-width="6"/>
  <circle cx="250" cy="250" r="31" fill="#b46b00" opacity="0.8"/>
  <path d="M220 236 C235 210 275 210 291 236 C272 228 241 228 220 236 Z" fill="#fff" opacity="0.32"/>
