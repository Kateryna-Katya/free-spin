    <circle cx="140.00" cy="59.47" r="6.2" fill="url(#bulb)" stroke="#fff6b8" stroke-width="1.4"/>
    <circle cx="174.76" cy="43.27" r="6.2" fill="url(#bulb)" stroke="#fff6b8" stroke-width="1.4"/>
    <circle cx="211.80" cy="33.34" r="6.2" fill="url(#bulb)" stroke="#fff6b8" stroke-width="1.4"/>
