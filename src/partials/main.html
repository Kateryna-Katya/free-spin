<section class="wheel-section">

    <h1 class="visually-hidden">
        JOKER'S COINS
    </h1>

    <img class="wheel-logo" src="/img/logo/logo.png" alt="JOKER'S COINS" loading="lazy">

    <div class="wheel-container">

        <div class="pointer"></div>

        <div class="wheel" id="wheel">

            <svg class="wheel-svg" viewBox="0 0 400 400">

                <defs>

                    <radialGradient id="gold" cx="35%" cy="25%">
                        <stop offset="0%" stop-color="#fff7a8" />
                        <stop offset="45%" stop-color="#ffcf2f" />
                        <stop offset="100%" stop-color="#8a4b00" />
                    </radialGradient>

                    <linearGradient id="orangeSector" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#ffb000" />
                        <stop offset="100%" stop-color="#ff3d00" />
                    </linearGradient>

                    <linearGradient id="yellowSector" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#fff36a" />
                        <stop offset="100%" stop-color="#ff9900" />
                    </linearGradient>

                    <filter id="shadow">
                        <feDropShadow dx="0" dy="6" stdDeviation="5" flood-opacity=".45" />
                    </filter>

                </defs>

                <!-- Outer ring -->

                <circle cx="200" cy="200" r="190" fill="url(#gold)" filter="url(#shadow)" />

                <circle cx="200" cy="200" r="165" fill="#5a1300" />

                <!-- Sectors -->

                <path d="M200 200 L365 200 A165 165 0 0 1 282.5 342.89 Z" fill="url(#orangeSector)" />
                <path d="M200 200 L282.5 342.89 A165 165 0 0 1 117.5 342.89 Z" fill="url(#yellowSector)" />
                <path d="M200 200 L117.5 342.89 A165 165 0 0 1 35 200 Z" fill="url(#orangeSector)" />
                <path d="M200 200 L35 200 A165 165 0 0 1 117.5 57.11 Z" fill="url(#yellowSector)" />
                <path d="M200 200 L117.5 57.11 A165 165 0 0 1 282.5 57.11 Z" fill="url(#orangeSector)" />
                <path d="M200 200 L282.5 57.11 A165 165 0 0 1 365 200 Z" fill="url(#yellowSector)" />

                <!-- Dividers -->

                <g stroke="url(#gold)" stroke-width="8" stroke-linecap="round">
                    <line x1="200" y1="200" x2="365" y2="200" />
                    <line x1="200" y1="200" x2="282.5" y2="342.89" />
                    <line x1="200" y1="200" x2="117.5" y2="342.89" />
                    <line x1="200" y1="200" x2="35" y2="200" />
                    <line x1="200" y1="200" x2="117.5" y2="57.11" />
                    <line x1="200" y1="200" x2="282.5" y2="57.11" />
                </g>

                <!-- Rings -->

                <circle cx="200" cy="200" r="180" fill="none" stroke="#fff6a8" stroke-width="6" />

                <circle cx="200" cy="200" r="165" fill="none" stroke="#7a3b00" stroke-width="8" />

                <circle cx="200" cy="200" r="74" fill="none" stroke="url(#gold)" stroke-width="8" />

                <!-- Text -->

                <g class="wheel-text">

                    <text text-anchor="middle" dominant-baseline="middle"
                        transform="translate(200 200) rotate(30) translate(145 0) rotate(-30)">
                        <tspan x="0" dy="-8">¡Inténtalo</tspan>
                        <tspan x="0" dy="18">de nuevo!</tspan>
                    </text>

                    <text text-anchor="middle" dominant-baseline="middle"
                        transform="translate(200 200) rotate(90) translate(135 0) rotate(-90)">
                        <tspan x="0">425%</tspan>
                    </text>

                    <text text-anchor="middle" dominant-baseline="middle"
                        transform="translate(200 200) rotate(150) translate(145 0) rotate(-150)">
                        <tspan x="0" dy="-8">100% +</tspan>
                        <tspan x="0" dy="18">125 FS</tspan>
                    </text>

                    <text text-anchor="middle" dominant-baseline="middle"
                        transform="translate(200 200) rotate(210) translate(145 0) rotate(-210)">
                        <tspan x="0" dy="-8">¡Inténtalo</tspan>
                        <tspan x="0" dy="18">de nuevo!</tspan>
                    </text>

                    <text text-anchor="middle" dominant-baseline="middle"
                        transform="translate(200 200) rotate(270) translate(135 0) rotate(-270)">
                        <tspan x="0">250 FS</tspan>
                    </text>

                    <text text-anchor="middle" dominant-baseline="middle"
                        transform="translate(200 200) rotate(330) translate(135 0) rotate(-330)">
                        <tspan x="0">100%</tspan>
                    </text>

                </g>

                <!-- Highlight -->

                <ellipse cx="150" cy="90" rx="95" ry="35" fill="rgba(255,255,255,.28)" transform="rotate(-25 150 90)" />

                <!-- Center -->

                <circle cx="200" cy="200" r="58" fill="url(#gold)" stroke="#fff6a8" stroke-width="6" />

                <circle cx="200" cy="200" r="28" fill="#ffb000" />

            </svg>

        </div>

    </div>

    <div class="spin-wrapper">

        <button class="spin-btn" id="spinBtn" type="button">
            SPIN
        </button>

    </div>

    <!-- Popup -->

    <div class="win-popup" id="winPopup">

        <div class="win-popup__content">

            <h2>
                ¡Felicidades!
            </h2>

            <p>
                Has ganado <strong>250 Free Spins</strong>
            </p>

            <a class="win-popup__btn" href="{offer}&offer_id=10">
                ¡RECLAMAR BONO!
            </a>

        </div>

    </div>

</section>
